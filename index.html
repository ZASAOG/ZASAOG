<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZASA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:#020d1f;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.spinner{
width:70px;height:70px;
border:6px solid #fff;
border-top:6px solid #00c3ff;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:15px;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

#loadingText{
color:white;
font-size:18px;
letter-spacing:1px;
}

/* BODY */
body{
background:linear-gradient(135deg,#020d1f,#0b2c5f);
color:white;
}

/* HEADER */
header{
text-align:center;
padding:20px;
}

/* LOGO */
.logo{
width:90%;
max-width:600px;
display:block;
margin:0 auto;
animation:glow 2s infinite alternate;
}

@keyframes glow{
0%{filter:drop-shadow(0 0 10px #00c3ff);}
100%{filter:drop-shadow(0 0 40px #00c3ff);}
}

/* MENU */
.menu-btn,.lang{
position:absolute;
top:15px;
background:#ff9800;
padding:10px;
border-radius:5px;
cursor:pointer;
}
.menu-btn{left:15px}
.lang{right:15px}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-250px;
width:250px;
height:100%;
background:#000;
padding-top:60px;
transition:0.3s;
}
.sidebar.show{left:0}
.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
border-bottom:1px solid #222;
}

/* SECTION */
.section{
display:none;
max-width:900px;
margin:20px auto;
padding:20px;
background:rgba(255,255,255,0.08);
border-radius:10px;
}
.active{display:block}

/* BUTTON */
.btn{
padding:10px;
background:#ff9800;
border:none;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
}

/* AI */
.ai-btn{
position:fixed;
bottom:90px;
right:20px;
background:#00c3ff;
padding:15px;
border-radius:50%;
cursor:pointer;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.ai-box{
position:fixed;
bottom:150px;
right:20px;
width:300px;
background:#111;
display:none;
flex-direction:column;
border-radius:10px;
overflow:hidden;
}

.ai-header{
background:#00c3ff;
padding:10px;
text-align:center;
font-weight:bold;
}

.ai-chat{
height:200px;
overflow:auto;
padding:10px;
font-size:14px;
}

.ai-box input{
width:70%;
padding:8px;
border:none;
}
.ai-box button{
width:30%;
background:#ff9800;
border:none;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<div class="spinner"></div>
<p id="loadingText">Loading ZASA...</p>
</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="lang" onclick="toggleLang()">EN</div>

<header>
<img src="logo.jpeg" class="logo">
<h1>ZASA</h1>
</header>

<div class="sidebar" id="sidebar">
<a onclick="showSection('home')" id="navHome"></a>
<a onclick="showSection('rules')" id="navRules"></a>
<a onclick="showSection('goals')" id="navGoals"></a>
<a onclick="showSection('join')" id="navJoin"></a>
<a onclick="showSection('katiba')" id="navKatiba"></a>
<a onclick="showSection('contact')" id="navContact"></a>
</div>

<div id="home" class="section active">
<h2 id="homeTitle"></h2>
<p id="homeDesc"></p>
</div>

<div id="rules" class="section">
<h2 id="rulesTitle"></h2>
<ul id="rulesList"></ul>
</div>

<div id="goals" class="section">
<h2 id="goalsTitle"></h2>
<ul id="goalsList"></ul>
</div>

<div id="join" class="section">
<h2 id="joinTitle"></h2>
<button class="btn" id="formBtn"></button>
<button class="btn" id="onlineBtn"></button>
<p id="joinMsg"></p>
</div>

<div id="katiba" class="section">
<h2 id="katibaTitle"></h2>
<button class="btn" id="katibaBtn"></button>
</div>

<div id="contact" class="section">
<h2 id="contactTitle"></h2>
<p>0714095979</p>
</div>

<a href="https://wa.me/255714095979" class="whatsapp">💬</a>

<div class="ai-btn" onclick="toggleAI()">🤖</div>

<div class="ai-box" id="aiBox">
<div class="ai-header">ZASA AI</div>
<div class="ai-chat" id="aiChat"></div>
<input id="aiInput" placeholder="Uliza..." onkeypress="if(event.key==='Enter')sendAI()">
<button onclick="sendAI()">Tuma</button>
</div>

<script>

/* LOADER */
window.onload=function(){
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},1500);
}

let lang="sw";

/* LANGUAGE DATA */
const data={
sw:{
nav:["Home","Masharti","Malengo","Kujiunga","Katiba","Mawasiliano"],
homeTitle:"Kuhusu ZASA",
homeDesc:"ZASA ni taasisi ya wanafunzi wa KIST inayohamasisha vijana kuhusu anga.",
rulesTitle:"Masharti",
rules:["Kuwa mwanafunzi","Kupenda anga","Kukubali katiba"],
goalsTitle:"Malengo",
goals:["Kukuza elimu ya anga","Kuhamasisha vijana","Kutoa mafunzo"],
joinTitle:"Kujiunga",
formBtn:"Pakua Fomu",
onlineBtn:"Jiunge Online",
katibaTitle:"Katiba",
katibaBtn:"Fungua Katiba",
contactTitle:"Mawasiliano"
},
en:{
nav:["Home","Requirements","Goals","Join","Constitution","Contact"],
homeTitle:"About ZASA",
homeDesc:"ZASA is a student organization from KIST inspiring youth in aerospace.",
rulesTitle:"Requirements",
rules:["Be a student","Have passion in aerospace","Accept constitution"],
goalsTitle:"Goals",
goals:["Promote aerospace education","Inspire youth","Provide training"],
joinTitle:"Join",
formBtn:"Download Form",
onlineBtn:"Join Online",
katibaTitle:"Constitution",
katibaBtn:"Open Constitution",
contactTitle:"Contact"
}
};

function applyLang(){
let d=data[lang];

["navHome","navRules","navGoals","navJoin","navKatiba","navContact"]
.forEach((id,i)=>document.getElementById(id).innerText=d.nav[i]);

document.getElementById("homeTitle").innerText=d.homeTitle;
document.getElementById("homeDesc").innerText=d.homeDesc;

document.getElementById("rulesTitle").innerText=d.rulesTitle;
document.getElementById("rulesList").innerHTML=d.rules.map(i=>`<li>${i}</li>`).join("");

document.getElementById("goalsTitle").innerText=d.goalsTitle;
document.getElementById("goalsList").innerHTML=d.goals.map(i=>`<li>${i}</li>`).join("");

document.getElementById("joinTitle").innerText=d.joinTitle;
document.getElementById("formBtn").innerText=d.formBtn;
document.getElementById("onlineBtn").innerText=d.onlineBtn;

document.getElementById("katibaTitle").innerText=d.katibaTitle;
document.getElementById("katibaBtn").innerText=d.katibaBtn;

document.getElementById("contactTitle").innerText=d.contactTitle;
}

function toggleLang(){
lang = lang==="sw"?"en":"sw";
document.querySelector(".lang").innerText = lang==="sw"?"EN":"SW";
applyLang();
}

applyLang();

/* MENU */
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("show");
}

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
toggleMenu();
}

/* AI */
function toggleAI(){
let b=document.getElementById("aiBox");
b.style.display=b.style.display==="flex"?"none":"flex";
}

function sendAI(){
let input=document.getElementById("aiInput");
let chat=document.getElementById("aiChat");

let msg=input.value;
if(!msg)return;

chat.innerHTML+=`<div><b>Wewe:</b> ${msg}</div>`;

let reply="Najaribu kujifunza 🤖";

if(msg.toLowerCase().includes("zasa")) reply="ZASA ni taasisi ya anga kwa vijana.";
if(msg.toLowerCase().includes("join")) reply="Nenda sehemu ya Join.";

setTimeout(()=>{
chat.innerHTML+=`<div><b>AI:</b> ${reply}</div>`;
},500);

input.value="";
}

</script>

</body>
</html>
