<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZASA | Aerospace Excellence</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

/* LOADER */
#loader{
position:fixed;width:100%;height:100%;
background:#020d1f;display:flex;
justify-content:center;align-items:center;
flex-direction:column;z-index:9999
}
.loader{
width:60px;height:60px;
border:6px solid #fff;
border-top:6px solid #ff9800;
border-radius:50%;
animation:spin 1s linear infinite
}
@keyframes spin{100%{transform:rotate(360deg)}}

/* BACKGROUND */
body{
background:linear-gradient(180deg,#020d1f,#0b2c5f);
color:white;
overflow-x:hidden
}

/* HERO */
header{
text-align:center;padding:60px
}
.logo{
width:140px;
filter:drop-shadow(0 0 20px #00c3ff);
animation:float 3s infinite
}
@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

h1{
font-size:26px;
text-shadow:0 0 10px #00c3ff
}

/* NAV */
nav{
display:flex;
justify-content:center;
gap:20px;
background:#000;
padding:10px
}
nav a{
color:#ff9800;
text-decoration:none;
font-weight:bold
}

/* SECTION */
.section{
max-width:900px;
margin:20px auto;
padding:25px;
background:rgba(255,255,255,0.08);
border-radius:15px;
backdrop-filter:blur(10px)
}

/* BUTTON */
.btn{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#ff9800;
border-radius:8px;
color:black;
text-decoration:none
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#000
}
</style>
</head>

<body>

<div id="loader">
<div class="loader"></div>
<p>Loading ZASA...</p>
</div>

<header>
<img src="logo.png.jpeg" class="logo">
<h1>ZANZIBAR AEROSPACE STUDENTS ASSOCIATION</h1>
<p>The Fewer, The Proud ✈️</p>
</header>

<nav>
<a href="#about">About</a>
<a href="#docs">Documents</a>
<a href="#contact">Contact</a>
</nav>

<section class="section" id="about">
<h2>About ZASA</h2>
<p>ZASA is a student association focused on aerospace, aviation and innovation in Zanzibar.</p>
</section>

<section class="section" id="docs">
<h2>Documents</h2>
<a href="katiba.pdf.docx" class="btn">Katiba</a><br>
<a href="fomu.pdf.png" class="btn">Fomu</a>
</section>

<section class="section" id="contact">
<h2>Contact</h2>
<p>📞 0714095979</p>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=0714095979">
</section>

<footer>
<p>© ZASA 2026</p>
</footer>

<script>
window.onload=()=>{document.getElementById("loader").style.display="none"}
</script>

</body>
</html>
